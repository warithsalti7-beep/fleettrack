version: '3.9'

# Production compose — used with a managed DB and Redis (e.g., Neon + Upstash).
# Override DATABASE_URL and REDIS_URL via environment or .env.production.
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: fleettrack_backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3001
      SENTRY_DSN: ${SENTRY_DSN}
      TESLA_CLIENT_ID: ${TESLA_CLIENT_ID}
      TESLA_CLIENT_SECRET: ${TESLA_CLIENT_SECRET}
      TESLA_REDIRECT_URI: ${TESLA_REDIRECT_URI}
      SMARTCAR_CLIENT_ID: ${SMARTCAR_CLIENT_ID}
      SMARTCAR_CLIENT_SECRET: ${SMARTCAR_CLIENT_SECRET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      SAMSARA_API_KEY: ${SAMSARA_API_KEY}
    ports:
      - '3001:3001'
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
