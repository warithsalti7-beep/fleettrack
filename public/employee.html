<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">

<title>FleetTrack — Employee Portal</title>
<link rel="stylesheet" href="./design-system.css">
<link rel="stylesheet" href="./ft-shell.css">
<style>
body { background:var(--bg); min-height:100vh; }
.app { max-width:1400px; margin:0 auto; padding:var(--s4) var(--s5); }

.top-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--s4) 0; margin-bottom:var(--s5);
  border-bottom:1px solid var(--b1);
  flex-wrap:wrap; gap:var(--s3);
}
.top-bar-left { display:flex; align-items:center; gap:var(--s4); flex-wrap:wrap; }
.brand { font-family:var(--mono); font-size:16px; font-weight:700; color:var(--t1); }
.brand-sub { font-size:11px; color:var(--t3); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.07em; }
.user-pill { display:flex; align-items:center; gap:var(--s3); background:var(--bg3); border:1px solid var(--b1); border-radius:var(--r6); padding:5px 14px 5px 5px; }
.user-avatar { width:32px; height:32px; border-radius:50%; background:var(--purplebg); border:1px solid var(--purpleborder); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--purple); }
.user-name { font-size:13px; font-weight:500; color:var(--t1); }
.user-role { font-size:11px; color:var(--t3); font-family:var(--mono); }
.logout-btn { background:none; border:none; color:var(--t3); font-size:18px; cursor:pointer; padding:4px; transition:color var(--fast); margin-left:var(--s2); }
.logout-btn:hover { color:var(--red); }

.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:var(--s3); margin-bottom:var(--s5); }
.kc { background:var(--bg2); border:1px solid var(--b1); border-radius:var(--r3); padding:var(--s4); }
.kc-label { font-size:11px; color:var(--t3); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:var(--s2); }
.kc-value { font-size:22px; font-weight:700; color:var(--t1); font-family:var(--mono); }
.kc-sub { font-size:11px; color:var(--t2); margin-top:4px; }
.kc-accent { width:24px; height:3px; border-radius:2px; margin-bottom:var(--s3); }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:var(--s4); }
@media(max-width:768px){ .two-col { grid-template-columns:1fr; } }

.card { background:var(--bg2); border:1px solid var(--b1); border-radius:var(--r3); padding:var(--s4); margin-bottom:var(--s4); }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--s3); padding-bottom:var(--s3); border-bottom:1px solid var(--b1); }
.card-title { font-size:13px; font-weight:600; color:var(--t1); }
.card-sub { font-size:11px; color:var(--t3); font-family:var(--mono); }

.access-alert { background:var(--bluebg); border:1px solid var(--blueborder); border-radius:var(--r3); padding:var(--s4); margin-bottom:var(--s5); color:var(--t1); font-size:13px; }
.access-alert strong { color:var(--blue2); }

.perm-list { display:flex; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s2); }
.perm-chip { font-family:var(--mono); font-size:11px; background:var(--bg3); border:1px solid var(--b1); border-radius:var(--r2); padding:3px 10px; color:var(--t2); }
.perm-chip.granted { background:var(--greenbg); border-color:var(--greenborder); color:var(--green); }

.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12.5px; }
th { text-align:left; padding:var(--s2) var(--s3); background:var(--bg3); color:var(--t3); font-weight:500; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.07em; border-bottom:1px solid var(--b1); }
td { padding:var(--s3); border-bottom:1px solid var(--b1); color:var(--t2); }
tr:hover td { background:var(--bg3); }

.no-access { text-align:center; padding:var(--s6); color:var(--t3); }
.no-access-icon { font-size:28px; margin-bottom:var(--s3); opacity:0.4; }

@media(max-width:640px) {
  .app { padding:var(--s3); }
  .user-pill { padding:5px 10px 5px 5px; }
  .user-name { display:none; }
  .kc-value { font-size:18px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="top-bar-left">
      <div>
        <div class="brand">FleetTrack</div>
        <div class="brand-sub">Employee Portal</div>
      </div>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="user-avatar">--</div>
      <div>
        <div class="user-name" id="user-name">—</div>
        <div class="user-role" id="user-role">—</div>
      </div>
      <button class="logout-btn" onclick="FleetAuth.logout('./login.html?portal=employee')" title="Sign out" aria-label="Sign out">⏻</button>
    </div>
  </div>

  <div class="access-alert">
    <strong>Your access level:</strong> <span id="access-summary">loading…</span>
    <div class="perm-list" id="perm-list"></div>
  </div>

  <div id="content"></div>
</div>

<div class="toast-container"></div>
<script src="./fleet-data.js"></script>
<script src="./auth.js"></script>
<script>
// Guard — employee + admin both allowed (admin can preview employee view)
const session = FleetAuth.requireAuth(['employee','admin'], './login.html?error=unauthorized');
if (!session) { /* will have redirected */ }

// Apply any admin-saved permission overrides
function getEffectivePermissions(s){
  try {
    const saved = JSON.parse(localStorage.getItem('ft_perms_' + s.userId) || 'null');
    return saved || s.permissions || [];
  } catch(e) { return s.permissions || []; }
}
const perms = getEffectivePermissions(session);
const can = (p) => perms.includes(p) || perms.includes('all');

// Header
document.getElementById('user-avatar').textContent = session.avatar || '—';
document.getElementById('user-name').textContent = session.name;
document.getElementById('user-role').textContent = session.role.toUpperCase();

// Access summary
const ALL_PERMS = ['view:drivers','view:trips','view:vehicles','view:alerts','view:financial','view:payroll','view:zones','manage:dispatch','manage:maintenance','export:reports'];
document.getElementById('access-summary').textContent = perms.includes('all') ? 'Full admin access' : (perms.length + ' permission' + (perms.length===1?'':'s') + ' granted');
document.getElementById('perm-list').innerHTML = ALL_PERMS.map(p =>
  `<span class="perm-chip ${can(p)?'granted':''}">${p}</span>`
).join('');

// Build a personalized dashboard based on granted permissions
const content = document.getElementById('content');
const sections = [];

// KPI grid — show whatever this employee can see
const kpis = [];
if (can('view:financial') || perms.includes('all')) {
  kpis.push({ color:'var(--green)', label:'Today Revenue', value:'<span class="cur" data-nok="55430">55 430 kr</span>', sub:'↑ 8.3% vs yesterday' });
  kpis.push({ color:'var(--green)', label:'Net Profit', value:'<span class="cur" data-nok="9200">9 200 kr</span>', sub:'16.6% margin' });
}
if (can('view:drivers') || perms.includes('all')) {
  kpis.push({ color:'var(--blue)', label:'Active Drivers', value:'11', sub:'of 19 on roster' });
}
if (can('view:trips') || perms.includes('all')) {
  kpis.push({ color:'var(--teal)', label:'Trips Today', value:'189', sub:'Avg 25.77 kr/trip' });
}
if (can('view:vehicles') || perms.includes('all')) {
  kpis.push({ color:'var(--purple)', label:'Vehicles on Road', value:'11', sub:'of 14 available' });
}
if (can('view:alerts') || perms.includes('all')) {
  kpis.push({ color:'var(--amber)', label:'Active Alerts', value:'4', sub:'2 high priority' });
}
if (kpis.length) {
  sections.push(`<div class="kpi-grid">${kpis.map(k=>`
    <div class="kc">
      <div class="kc-accent" style="background:${k.color}"></div>
      <div class="kc-label">${k.label}</div>
      <div class="kc-value">${k.value}</div>
      <div class="kc-sub">${k.sub}</div>
    </div>`).join('')}</div>`);
}

// Dispatch panel
if (can('manage:dispatch')) {
  sections.push(`<div class="card">
    <div class="card-header"><div class="card-title">Dispatch Queue</div><div class="card-sub">Open pickups</div></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Time</th><th>Pickup</th><th>Driver</th><th>Status</th></tr></thead>
      <tbody><tr><td colspan="4" class="text-muted text-center" style="padding:var(--s5);font-size:12.5px">No active dispatch queue — queued pickups appear here as trips come in.</td></tr></tbody>
    </table></div>
  </div>`);
}

// Two-column row
const row = [];
if (can('view:drivers')) {
  row.push(`<div class="card" style="margin-bottom:0">
    <div class="card-header"><div class="card-title">Driver Status</div><div class="card-sub">Live</div></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Driver</th><th>Car</th><th>Status</th></tr></thead>
      <tbody id="drv-status"></tbody>
    </table></div>
  </div>`);
}
if (can('view:alerts')) {
  row.push(`<div class="card" style="margin-bottom:0">
    <div class="card-header"><div class="card-title">Alerts</div><div class="card-sub">Active</div></div>
    <div id="emp-alerts" style="font-size:13px;line-height:1.7;color:var(--t3)">
      Active alerts appear here — pulled from /api/diagnostics/issues.
    </div>
  </div>`);
}
if (row.length) sections.push(`<div class="two-col">${row.join('')}</div>`);

// Payroll panel
if (can('view:payroll')) {
  sections.push(`<div class="card">
    <div class="card-header"><div class="card-title">Payroll Today</div><div class="card-sub">Net payouts</div></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Driver</th><th>Car</th><th>Trips</th><th>Gross</th><th>Commission (65%)</th><th>Net payout</th></tr></thead>
      <tbody id="pay-rows"></tbody>
    </table></div>
  </div>`);
}

// Maintenance panel
if (can('manage:maintenance')) {
  sections.push(`<div class="card">
    <div class="card-header"><div class="card-title">Maintenance Schedule</div><div class="card-sub">Next 14 days</div></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Car</th><th>Service</th><th>Due</th><th>Workshop</th><th>Est. cost</th></tr></thead>
      <tbody><tr><td colspan="5" class="text-muted text-center" style="padding:var(--s5);font-size:12.5px">No upcoming services — scheduled services appear here once Maintenance CSV is uploaded.</td></tr></tbody>
    </table></div>
  </div>`);
}

// Export panel
if (can('export:reports')) {
  sections.push(`<div class="card">
    <div class="card-header"><div class="card-title">Quick Exports</div><div class="card-sub">CSV downloads</div></div>
    <div style="display:flex;gap:var(--s2);flex-wrap:wrap">
      <button class="btn" onclick="downloadReport('today-trips')">⬇ Today's Trips</button>
      <button class="btn" onclick="downloadReport('payroll-today')">⬇ Payroll Today</button>
      <button class="btn" onclick="downloadReport('maintenance-schedule')">⬇ Maintenance Schedule</button>
    </div>
  </div>`);
}

// No permissions — empty state
if (sections.length === 0) {
  sections.push(`<div class="card">
    <div class="no-access">
      <div class="no-access-icon">🔒</div>
      <div style="font-size:15px;color:var(--t2);margin-bottom:var(--s2)">No access granted yet</div>
      <div style="font-size:12px">Your administrator hasn't granted any permissions yet. Contact them to get access to fleet data.</div>
    </div>
  </div>`);
}

content.innerHTML = sections.join('');

// Fill live driver status (uses real roster from auth.js)
const drvStatus = document.getElementById('drv-status');
if (drvStatus) {
  const statuses = [
    {s:'On trip', cls:'b-green'},
    {s:'Available', cls:'b-blue'},
    {s:'Break', cls:'b-gray'},
    {s:'Off duty', cls:'b-gray'},
  ];
  drvStatus.innerHTML = FleetAuth.getUsersByRole('driver').slice(0,8).map((d,i)=>{
    const st = statuses[i % statuses.length];
    return `<tr><td><strong>${d.name.split(' ').slice(0,2).join(' ')}</strong></td><td style="font-family:var(--mono)">${d.carId}</td><td><span class="badge ${st.cls}">${st.s}</span></td></tr>`;
  }).join('');
}

// Fill payroll table (uses real roster + deterministic numbers from index)
const payRows = document.getElementById('pay-rows');
if (payRows) {
  const seed = (i,mod)=> ((i*37+11) % mod);
  payRows.innerHTML = FleetAuth.getUsersByRole('driver').slice(0,8).map((d,i)=>{
    const trips = 14 + seed(i, 9);
    const gross = Math.round(trips * (280 + seed(i, 35)));
    const commission = Math.round(gross * 0.65);
    const net = gross - commission;
    return `<tr>
      <td><strong>${d.name.split(' ').slice(0,2).join(' ')}</strong></td>
      <td style="font-family:var(--mono)">${d.carId}</td>
      <td>${trips}</td>
      <td><span class="cur" data-nok="${gross}">${gross.toLocaleString('fr-FR').replace(/\u202f|,/g,' ')} kr</span></td>
      <td><span class="cur" data-nok="${commission}">${commission.toLocaleString('fr-FR').replace(/\u202f|,/g,' ')} kr</span></td>
      <td style="font-weight:600;color:var(--green)"><span class="cur" data-nok="${net}">${net.toLocaleString('fr-FR').replace(/\u202f|,/g,' ')} kr</span></td>
    </tr>`;
  }).join('');
}

function downloadReport(kind){
  // Exports pull LIVE data via /api/export/*. No demo fallbacks.
  const map = {
    'today-trips':         { url: '/api/export/trips?window=today' },
    'payroll-today':       { rows: [...payRows.querySelectorAll('tr')].map(tr =>
                              [...tr.querySelectorAll('th,td')].map(c=>c.innerText.replace(/\s+/g,' ').trim())) },
    'maintenance-schedule':{ url: '/api/export/maintenance?window=next14' },
  };
  if (map[kind]?.url) {
    window.open(map[kind].url, '_blank');
    return;
  }
  const data = map[kind];
  if(!data){ Toast.error('Unknown report'); return; }
  const csv = data.rows.map(r => r.map(c => /[",\n]/.test(c) ? `"${c.replace(/"/g,'""')}"` : c).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = kind + '-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{a.remove(); URL.revokeObjectURL(url);}, 100);
  Toast.success('Downloaded: ' + a.download);
}

// Render currency
if (typeof FleetCurrency !== 'undefined') {
  FleetCurrency.rerender();
  FleetCurrency.injectToggle(); if(typeof FleetTheme!=="undefined")FleetTheme.injectToggle();
}
</script>
</body>
</html>
