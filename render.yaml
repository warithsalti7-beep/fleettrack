services:
  - type: web
    name: fleettrack-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: fleettrack-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fleettrack-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: TESLA_CLIENT_ID
        sync: false
      - key: TESLA_CLIENT_SECRET
        sync: false
      - key: TESLA_REDIRECT_URI
        sync: false
      - key: SMARTCAR_CLIENT_ID
        sync: false
      - key: SMARTCAR_CLIENT_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: SAMSARA_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
    autoDeploy: true

databases:
  - name: fleettrack-db
    databaseName: fleettrack
    user: fleettrack
    plan: starter
    region: oregon

  - name: fleettrack-redis
    plan: starter
    region: oregon
    ipAllowList: []
