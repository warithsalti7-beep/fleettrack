version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fleettrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleettrack
      POSTGRES_PASSWORD: fleettrack_dev
      POSTGRES_DB: fleettrack
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleettrack']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fleettrack_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: fleettrack_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fleettrack:fleettrack_dev@postgres:5432/fleettrack
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      PORT: 3001
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: pnpm start:dev

volumes:
  postgres_data:
  redis_data:
